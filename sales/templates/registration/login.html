<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Login</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #dc2626;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #e2e8f0, #f8fafc);
            font-family: "Segoe UI", sans-serif;
            color: var(--text);
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: var(--card);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.65rem;
        }

        .subtitle {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 0.98rem;
        }

        input:focus {
            outline: 2px solid #99f6e4;
            border-color: var(--accent);
        }

        .errorlist {
            color: var(--danger);
            margin: 6px 0 0;
            padding-left: 18px;
            font-size: 0.88rem;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .helper-links {
            margin-top: 16px;
            text-align: center;
            font-size: 0.93rem;
            color: var(--muted);
        }

        .helper-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>POS Login</h1>
        <p class="subtitle">Sign in to access inventory and sales tools.</p>

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                {{ form.non_field_errors }}
            {% endif %}

            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="helper-links">
            New here?
            <a href="/sales/register/">Create an account</a>
        </div>
    </main>
</body>
</html>
