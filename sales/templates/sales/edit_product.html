<!-- sales/templates/sales/edit_product.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product — {{ product.name }}</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background:#f8fafc; color:#1a202c; display:flex; align-items:center; justify-content:center; min-height:100vh }
        .card { background:#fff; padding:28px; border-radius:12px; box-shadow:0 20px 50px rgba(2,6,23,0.06); width:100%; max-width:680px }
        label { font-weight:700; font-size:0.95em; margin-bottom:6px; display:block }
        .form-input, input[type=text], input[type=number], select, input[type=file], textarea {
            width:100%;
            padding:10px 12px;
            border-radius:8px;
            border:1px solid #e2e8f0;
            box-sizing: border-box;
            background: #fff;
        }
        .field { display:flex; flex-direction:column; gap:6px }
        .grid-two { display:grid; grid-template-columns:1fr 1fr; gap:12px }
        .actions { display:flex; gap:12px; justify-content:flex-end; margin-top:10px }
        .btn { background:#3182ce; color:white; padding:10px 18px; border-radius:8px; border:none; cursor:pointer }
        .btn.cancel { background:#e53e3e }
        @media (max-width:640px){ .grid-two { grid-template-columns:1fr } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Edit Product — {{ product.name }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div style="display:grid;grid-template-columns:1fr 240px;gap:18px;align-items:start">
                <div>
                    <div class="grid-two">
                        <div class="field">
                            <label for="id_name">Name</label>
                            {{ form.name }}
                        </div>
                        <div class="field">
                            <label for="id_category">Category</label>
                            {{ form.category }}
                        </div>
                        <div class="field">
                            <label for="id_price">Price</label>
                            {{ form.price }}
                        </div>
                        <div class="field">
                            <label for="id_stock">Stock</label>
                            {{ form.stock }}
                        </div>
                        <div class="field">
                            <label for="id_barcode">Barcode</label>
                            {{ form.barcode }}
                        </div>
                        <div class="field">
                            <label for="id_image">Image (replace)</label>
                            <input type="file" name="image" id="id_image" accept="image/*" class="form-input">
                            <div id="file-name" style="margin-top:8px;color:#4a5568;font-size:0.95em"></div>
                        </div>
                    </div>
                </div>
                <div>
                    <div style="background:#f7fafc;padding:12px;border-radius:10px;border:1px solid #edf2f7;text-align:center">
                        {% if product.image %}
                            <div style="font-weight:700;margin-bottom:8px">Current image</div>
                            <img id="preview-img" src="{{ product.image.url }}" alt="{{ product.name }}" style="width:180px;height:180px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:8px">
                            <div style="margin-top:6px">
                                <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer">
                                    <input type="checkbox" name="clear_image" value="1"> <span style="font-weight:600;font-size:0.95em">Remove image</span>
                                </label>
                            </div>
                        {% else %}
                            <div style="font-weight:700;margin-bottom:8px;color:#64748b">No image</div>
                            <div id="preview-img" style="width:180px;height:180px;border-radius:8px;background:#f1f5f9;display:inline-block;line-height:180px;color:#94a3b8;font-weight:700">IMG</div>
                        {% endif %}
                    </div>
                </div>
            </div>
            <div class="actions">
                <button class="btn" type="submit">Save Changes</button>
                <a href="{% url 'product_list' %}" class="btn cancel" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center">Cancel</a>
            </div>
        </form>
    </div>
            <script>
                (function(){
                    const fileInput = document.getElementById('id_image');
                    const fileName = document.getElementById('file-name');
                    const preview = document.getElementById('preview-img');

                    if (!fileInput) return;

                    fileInput.addEventListener('change', function(e){
                        const f = this.files && this.files[0];
                        if (!f) {
                            fileName.textContent = '';
                            return;
                        }
                        fileName.textContent = f.name;

                        if (preview && f.type.startsWith('image/')){
                            const reader = new FileReader();
                            reader.onload = function(ev){
                                if (preview.tagName.toLowerCase() === 'img'){
                                    preview.src = ev.target.result;
                                } else {
                                    // replace placeholder div with img
                                    const img = document.createElement('img');
                                    img.id = 'preview-img';
                                    img.src = ev.target.result;
                                    img.style.width = '180px';
                                    img.style.height = '180px';
                                    img.style.objectFit = 'cover';
                                    img.style.borderRadius = '8px';
                                    img.style.border = '1px solid #e2e8f0';
                                    preview.replaceWith(img);
                                }
                            };
                            reader.readAsDataURL(f);
                        }
                    });
                })();
            </script>
</body>
</html>
